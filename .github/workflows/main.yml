name: RustDesk Remote Desktop Windows

on:
  workflow_dispatch:
    inputs:
      RUSTDESK_PASSWORD:
        description: "RustDesk unattended access password"
        required: true
        default: "123456"
      RUSTDESK_ID_SERVER:
        description: "Optional RustDesk ID server"
        required: false
        default: ""
      RUSTDESK_RELAY_SERVER:
        description: "Optional RustDesk relay server"
        required: false
        default: ""
      RUSTDESK_API_SERVER:
        description: "Optional RustDesk API server"
        required: false
        default: ""
      RUSTDESK_KEY:
        description: "Optional RustDesk server key"
        required: false
        default: ""

jobs:
  rustdesk:
    runs-on: windows-2022

    steps:
      - name: Show system info
        run: systeminfo

      # Install tools
      - name: Install 7-Zip, Python, and Go
        run: |
          Write-Host "Downloading installers..."

          Invoke-WebRequest "https://github.com/ip7z/7zip/releases/download/25.01/7z2501-x64.exe" -OutFile "7zip.exe"
          Invoke-WebRequest "https://www.python.org/ftp/python/3.12.2/python-3.12.2-amd64.exe" -OutFile "python.exe"
          Invoke-WebRequest "https://go.dev/dl/go1.22.5.windows-amd64.msi" -OutFile "go.msi"

          Write-Host "Installing..."

          Start-Process ".\7zip.exe" -ArgumentList "/S" -Wait
          Start-Process ".\python.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1" -Wait
          Start-Process "msiexec.exe" -ArgumentList "/i go.msi /quiet /norestart" -Wait

      - name: Install Python requests package
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify installations
        run: |
          python --version
          pip show requests
          go version

      # Install RustDesk
      - name: Download RustDesk
        run: |
          Write-Host "Getting latest RustDesk release..."

          $release = Invoke-RestMethod "https://api.github.com/repos/rustdesk/rustdesk/releases/latest"

          $asset = $release.assets | Where-Object {
            $_.name -match "x86_64.*\.exe$" -and
            $_.name -notmatch "sciter" -and
            $_.name -notmatch "aarch64"
          } | Select-Object -First 1

          if (-not $asset) {
            Write-Error "Could not find RustDesk Windows x86_64 installer."
            exit 1
          }

          Write-Host "Downloading $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile "rustdesk.exe"

      - name: Install RustDesk
        run: |
          Write-Host "Installing RustDesk..."

          Start-Process ".\rustdesk.exe" -ArgumentList "--silent-install" -Wait

          Start-Sleep -Seconds 10

          $rustdeskPath = "C:\Program Files\RustDesk\rustdesk.exe"

          if (-not (Test-Path $rustdeskPath)) {
            Write-Error "RustDesk installation failed. rustdesk.exe not found."
            exit 1
          }

          Write-Host "RustDesk installed successfully."

      - name: Configure RustDesk
        run: |
          $rustdeskPath = "C:\Program Files\RustDesk\rustdesk.exe"

          $password = "$ github.event.inputs.RUSTDESK_PASSWORD "
          $idServer = "$ github.event.inputs.RUSTDESK_ID_SERVER "
          $relayServer = "$ github.event.inputs.RUSTDESK_RELAY_SERVER "
          $apiServer = "$ github.event.inputs.RUSTDESK_API_SERVER "
          $key = "$ github.event.inputs.RUSTDESK_KEY "

          Write-Host "Starting RustDesk service..."

          Start-Service RustDesk -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          Write-Host "Setting RustDesk password..."
          & $rustdeskPath --password $password

          if ($idServer -ne "") {
            Write-Host "Setting RustDesk ID server..."
            & $rustdeskPath --config rendezvous-server=$idServer
          }

          if ($relayServer -ne "") {
            Write-Host "Setting RustDesk relay server..."
            & $rustdeskPath --config relay-server=$relayServer
          }

          if ($apiServer -ne "") {
            Write-Host "Setting RustDesk API server..."
            & $rustdeskPath --config api-server=$apiServer
          }

          if ($key -ne "") {
            Write-Host "Setting RustDesk key..."
            & $rustdeskPath --config key=$key
          }

          Restart-Service RustDesk -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 10

      - name: Show RustDesk connection info
        run: |
          $rustdeskPath = "C:\Program Files\RustDesk\rustdesk.exe"

          Write-Host "Getting RustDesk ID..."
          $id = & $rustdeskPath --get-id

          Write-Host "=========================================="
          Write-Host "RustDesk is ready."
          Write-Host "RustDesk ID: $id"
          Write-Host "Password: $ github.event.inputs.RUSTDESK_PASSWORD "
          Write-Host "Use the RustDesk app to connect."
          Write-Host "=========================================="

      # Keep alive + countdown
      - name: Keep machine alive with timer 6 hours
        run: |
          Write-Host "Machine ready."
          Write-Host "Connect using RustDesk."

          $totalMinutes = 360
          $interval = 30

          for ($elapsed = 0; $elapsed -lt $totalMinutes; $elapsed += $interval) {
            $remaining = $totalMinutes - $elapsed
            Write-Host "Machine time remaining: $remaining minutes"
            Start-Sleep -Seconds ($interval * 60)
          }

          Write-Host "Session time completed."
