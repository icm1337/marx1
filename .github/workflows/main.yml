name: RustDesk Remote Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      PASSWORD:
        description: "Permanent password for RustDesk (8+ chars recommended)"
        required: true
        default: "ChangeMe123!"

jobs:
  rustdesk:
    runs-on: windows-2022

    steps:
      - name: Show system info
        run: systeminfo

      # Install tools
      - name: Install 7-Zip, Python, and Go
        run: |
          Write-Host "Downloading installers..."

          Invoke-WebRequest "https://github.com/ip7z/7zip/releases/download/25.01/7z2501-x64.exe" -OutFile "7zip.exe"
          Invoke-WebRequest "https://www.python.org/ftp/python/3.12.2/python-3.12.2-amd64.exe" -OutFile "python.exe"
          Invoke-WebRequest "https://go.dev/dl/go1.22.5.windows-amd64.msi" -OutFile "go.msi"

          Write-Host "Installing..."

          Start-Process ".\7zip.exe" -ArgumentList "/S" -Wait
          Start-Process ".\python.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1" -Wait
          Start-Process "msiexec.exe" -ArgumentList "/i go.msi /quiet /norestart" -Wait

      - name: Install Python requests package
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify installations
        run: |
          python --version
          pip show requests
          go version

      # Install RustDesk
      - name: Download RustDesk
        run: |
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.3.8/rustdesk-1.3.8-x86_64.exe"
          Invoke-WebRequest -Uri $url -OutFile "rustdesk.exe"

      - name: Install RustDesk silently
        run: |
          # Silent install flag for RustDesk
          Start-Process ".\rustdesk.exe" -ArgumentList "--silent-install" -Wait
          Start-Sleep -Seconds 15

      - name: Start RustDesk service
        run: |
          $exe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "RustDesk not found at $exe"
            exit 1
          }

          # Install & start the RustDesk service (required for unattended access)
          Start-Process $exe -ArgumentList "--install-service" -Wait
          Start-Sleep -Seconds 10

      # Configure RustDesk
      - name: Set RustDesk permanent password
        run: |
          $exe = "C:\Program Files\RustDesk\rustdesk.exe"
          $password = "$ github.event.inputs.PASSWORD "

          # Set the permanent password used for incoming connections
          & $exe --password "$password"
          Start-Sleep -Seconds 5

      - name: Get RustDesk ID
        run: |
          $exe = "C:\Program Files\RustDesk\rustdesk.exe"

          # The ID may take a few seconds to be assigned after the service starts
          $id = $null
          for ($i = 0; $i -lt 12; $i++) {
            $id = (& $exe --get-id) 2>$null
            if ($id -and $id.Trim().Length -gt 0) { break }
            Start-Sleep -Seconds 5
          }

          Write-Host "==============================================="
          Write-Host " RustDesk is ready."
          Write-Host " ID:       $id"
          Write-Host " Password: (the PASSWORD input you provided)"
          Write-Host " Client:   https://rustdesk.com/  (download for your OS)"
          Write-Host "==============================================="

      # Keep alive + countdown
      - name: Keep machine alive with timer (6 hours)
        run: |
          Write-Host "Machine ready. Connect with RustDesk using the ID + password above."

          $totalMinutes = 360
          $interval = 30

          for ($elapsed = 0; $elapsed -lt $totalMinutes; $elapsed += $interval) {
            $remaining = $totalMinutes - $elapsed
            Write-Host "Machine time remaining: $remaining minutes"
            Start-Sleep -Seconds ($interval * 60)
          }

          Write-Host "Session time completed."
