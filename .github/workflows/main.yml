name: RustDesk Remote Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      PASSWORD:
        description: "Permanent password for RustDesk (8+ chars)"
        required: true
        default: "ChangeMe123!"

jobs:
  rustdesk:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Show system info
        run: systeminfo

      - name: Install 7-Zip, Python, and Go
        run: |
          Invoke-WebRequest "https://github.com/ip7z/7zip/releases/download/25.01/7z2501-x64.exe" -OutFile "7zip.exe"
          Invoke-WebRequest "https://www.python.org/ftp/python/3.12.2/python-3.12.2-amd64.exe" -OutFile "python.exe"
          Invoke-WebRequest "https://go.dev/dl/go1.22.5.windows-amd64.msi" -OutFile "go.msi"

          Start-Process ".\7zip.exe"  -ArgumentList "/S" -Wait
          Start-Process ".\python.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1" -Wait
          Start-Process "msiexec.exe"  -ArgumentList "/i go.msi /quiet /norestart" -Wait

      - name: Install Python requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify installs
        run: |
          python --version
          pip show requests
          go version

      - name: Install RustDesk (with timeout + force-kill)
        run: |
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.3.8/rustdesk-1.3.8-x86_64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\rustdesk.exe"

          Write-Host "Launching installer (max 2 min)..."
          $proc = Start-Process "$env:TEMP\rustdesk.exe" `
            -ArgumentList "--silent-install" -PassThru
          $exited = $proc.WaitForExit(120000)

          if (-not $exited) {
            Write-Host "Installer hung — killing it."
            Get-Process -Name "rustdesk*" -ErrorAction SilentlyContinue |
              Stop-Process -Force
            Start-Sleep -Seconds 5
          }

          $exe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "RustDesk binary missing at $exe"
            exit 1
          }
          "RUSTDESK_EXE=$exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install and start RustDesk service
        run: |
          $proc = Start-Process "$env:RUSTDESK_EXE" `
            -ArgumentList "--install-service" -PassThru
          $proc.WaitForExit(60000) | Out-Null
          Get-Process -Name "rustdesk*" -ErrorAction SilentlyContinue |
            Where-Object { $_.Id -eq $proc.Id } | Stop-Process -Force -ErrorAction SilentlyContinue

          Start-Service -Name "RustDesk" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 15
          Get-Service -Name "RustDesk" | Format-List Name, Status, StartType

      - name: Set RustDesk permanent password
        run: |
          & "$env:RUSTDESK_EXE" --password "$8"
          Start-Sleep -Seconds 5

      - name: Get RustDesk ID
        run: |
          $id = $null
          for ($i = 0; $i -lt 24; $i++) {
            $id = (& "$env:RUSTDESK_EXE" --get-id) 2>$null
            if ($id -and $id.Trim().Length -gt 0) { break }
            Start-Sleep -Seconds 5
          }
          if (-not $id) {
            Write-Error "Failed to retrieve RustDesk ID."
            exit 1
          }

          Write-Host "==============================================="
          Write-Host " RustDesk is ready."
          Write-Host " ID:       $($id.Trim())"
          Write-Host " Password: (the PASSWORD input you provided)"
          Write-Host "==============================================="

      - name: Keep machine alive (350 min)
        run: |
          $totalMinutes = 350
          $interval = 30
          for ($e = 0; $e -lt $totalMinutes; $e += $interval) {
            Write-Host "Machine time remaining: $($totalMinutes - $e) minutes"
            Start-Sleep -Seconds ($interval * 60)
          }
